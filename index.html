<html>
<head>
    <title></title>
    <style>
    *{
        margin: 0;
        padding: 0;

    }
    #contenedor{
        width: 400px;
        height: 200px;
        border: 1px solid black;
        position: relative;
        margin: 0 auto; /*centrar el contenedor*/
        overflow: hidden;/*oculta todo lo que contiene*/
        background-color: black;
    }

    #cuadrito{
        width: 100px;
        height: 100px;
        background-color: black;
        position: absolute; /*obligatorio para mover el div*/
        top:50px;
        left:100px;

        animation: cuadrito 3s infinite;
        transform: rotate(-25deg) scaleX(-1);

        animation-timing-function: linear; /*define  la forma de moverse*/
    }
    @keyframes cuadrito{
        from{
            right: 5px;
        }
        to{
            right: 500px;

        }
    }

    #cuadrito img{
        width: 100px;
        height: 100px;


    }
    .estrellitas{
    width: 5px;
    height: 5px;
    background-color: yellow;
    border-radius: 50%;
    position: absolute;

    animation: flotar 7s infinite;
    animation-timing-function: linear; 
    }
    @keyframes flotar{
    from{
        transform: translateX(-30PX);

    }
    to{
        transform: translateX(100px);
    }

    }
    </style>
</head>
<body>
    <div id="contenedor">
        <div id="cuadrito">
            <img src="img/img5.gif" alt="">
        </div>
            <div class="estrellitas" style="left:10px; top:180px; animation-duration:3s;"></div>
            <div class="estrellitas" style="left:50px; top:100px; animation-duration:5s;"></div>
            <div class="estrellitas" style="left:120px; top:150px; animation-duration:4s;"></div>
            <div class="estrellitas" style="left:200px; top:50px; animation-duration:6s;"></div>
            <div class="estrellitas" style="left:300px; top:120px; animation-duration:3s;"></div>
            <div class="estrellitas" style="left:350px; top:30px; animation-duration:5s;"></div>
            <div class="estrellitas" style="left:80px; top:70px; animation-duration:4s;"></div>
            <div class="estrellitas" style="left:250px; top:180px; animation-duration:6s;"></div>
    </div>
</body>
</html>
